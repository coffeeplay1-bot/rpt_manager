<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여행 안내 종합 매니저 (실시간 공유방)</title>
    <!-- 외부 보관 중인 스타일시트 링크 정식 연결 -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- 🎯 [최적화] 설정 버튼이 제거된 정갈한 왼쪽 사이드바 메뉴 대지 -->
    <div class="sidebar">
        <h2>✈️ 공동 관리 시스템</h2>
        <div class="menu-group">
            <button id="menu-product" class="menu-btn">📦 상품 안내</button>
            <button id="menu-katalk" class="menu-btn">💬 카톡 안내</button>
            <button id="menu-openchat" class="menu-btn">💛 오픈채팅방 관리</button>
            <button id="menu-calc" class="menu-btn">🧮 계산기 기능</button>
        </div>
    </div>
    
    <!-- 우측 메인 콘텐츠 공간 -->
    <div class="main-container" id="content-area"></div>
    <div id="global-modal" class="modal"></div>

    <!-- 호스팅 및 원격 데이터베이스 연결 인프라 -->
    <script src="./firebase-app-compat.js"></script>
    <script src="./firebase-firestore-compat.js"></script>
    
    <!-- 모든 스크립트 제어 권한을 캡슐화된 app.js 단 한 곳으로만 넘겨 중복 충돌을 원천 차단합니다 -->
    <script type="module" src="./app.js"></script>

</body>
</html>
